<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>残業代タイマー</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #f4f6fb 0%, #eef1f7 100%);
      color: #0d1635;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s, color 0.3s;
    }

    body.dark-mode {
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #f3f4f6;
    }

    .card {
      width: min(92vw, 760px);
      margin: 36px auto;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      padding: 28px 20px 32px;
      box-shadow: 0 12px 40px rgba(31, 41, 55, 0.08);
      backdrop-filter: blur(8px);
    }

    body.dark-mode .card {
      background: rgba(31, 41, 55, 0.92);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 6px 0 28px;
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 1px;
    }

    .amount-label {
      text-align: center;
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 10px;
    }

    body.dark-mode .amount-label,
    body.dark-mode .field-label,
    body.dark-mode .info-title,
    body.dark-mode .settings-summary-title,
    body.dark-mode .hint,
    body.dark-mode .settings-summary-value small {
      color: #cbd5e1;
    }

    .amount {
      text-align: center;
      font-size: clamp(56px, 10vw, 84px);
      font-weight: 900;
      line-height: 1;
      margin: 8px 0 28px;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      word-break: break-all;
    }

    .field-group {
      margin-bottom: 22px;
    }

    .field-label {
      display: block;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #6b7280;
    }

    .time-input,
    input[type="number"] {
      display: block;
      width: 100%;
      max-width: 100%;
      border: 2px solid #d7dbe5;
      border-radius: 22px;
      background: #fff;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;
    }

    .time-input {
      min-height: 84px;
      padding: 0 20px;
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      text-align: center;
    }

    input[type="number"] {
      min-height: 56px;
      padding: 0 16px;
      font-size: 18px;
      color: #111827;
    }

    .time-input:focus,
    input[type="number"]:focus {
      border-color: #7aaef7;
      box-shadow: 0 0 0 4px rgba(122, 174, 247, 0.15);
    }

    body.dark-mode .time-input,
    body.dark-mode input[type="number"] {
      background: #111827;
      color: #f9fafb;
      border-color: #374151;
    }

    .settings-summary,
    .info-item {
      border: 2px solid #e3e7ef;
      border-radius: 22px;
      padding: 18px 18px 16px;
      background: rgba(255, 255, 255, 0.7);
      margin-bottom: 18px;
    }

    body.dark-mode .settings-summary,
    body.dark-mode .info-item {
      background: rgba(17, 24, 39, 0.75);
      border-color: #374151;
    }

    .settings-summary-title,
    .info-title {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .settings-summary-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.3;
    }

    .settings-summary-value small {
      display: block;
      font-size: 16px;
      color: #6b7280;
      margin-top: 6px;
      font-weight: 600;
    /* --- 新增：提升 time 输入在手机上的可读性与避免溢出 --- */
    .input-row input[type="time"] {
      font-size: 20px;        /* 数字更大更好看 */
      padding: 14px 16px;     /* 更舒适的触控区域 */
      max-width: 100%;        /* 不超出容器 */
      min-width: 0;           /* 避免 flex 爆出（保险） */
      box-sizing: border-box;
    }

    /* 去掉部分浏览器默认的内置按钮（兼容性友好提示） */
    input[type="time"]::-webkit-clear-button,
    input[type="time"]::-webkit-inner-spin-button {
      display: none;
    }

    /* 响应式微调：窄屏时稍微缩小以保证整体布局 */
    @media (max-width: 420px) {
      .card { padding: 18px; }
      h1 { font-size: 24px; }
      .amount { font-size: 40px; }
      .input-row input[type="time"] { font-size: 18px; padding: 12px 12px; }
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 14px 0;
    }

    button {
      width: 100%;
      min-height: 72px;
      border: none;
      border-radius: 20px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:active {
      transform: scale(0.98);
    }

    .primary { background: #22c55e; color: #0b1324; }
    .accent { background: #60a5fa; color: #0b1324; }
    .secondary { background: #dbe1ee; color: #0d1635; }

    body.dark-mode .secondary {
      background: #374151;
      color: #f9fafb;
    }

    .info {
      display: grid;
      gap: 0;
      margin-top: 10px;
    }

    .info-value {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin-top: 28px;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.8;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.32);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(92vw, 460px);
      background: #fff;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
    }

    body.dark-mode .modal {
      background: #1f2937;
      color: #f9fafb;
    }

    .modal h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    .modal p {
      margin: 0 0 16px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    body.dark-mode .modal p {
      color: #cbd5e1;
    }

    .modal .field-label {
      font-size: 16px;
      margin: 14px 0 8px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions button {
      min-height: 58px;
      border-radius: 16px;
      font-size: 16px;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .card {
        width: calc(100vw - 24px);
        margin: 18px auto;
        padding: 22px 14px 26px;
        border-radius: 24px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 22px;
      }

      .amount-label {
        font-size: 16px;
      }

      .amount {
        font-size: 72px;
        margin-bottom: 24px;
      }

      .field-label {
        font-size: 16px;
      }

      .time-input {
        min-height: 76px;
        font-size: 22px;
        border-radius: 18px;
        padding: 0 14px;
      }

      .settings-summary-value {
        font-size: 22px;
      }

      .settings-summary-value small {
        font-size: 14px;
      }

      .info-value {
        font-size: 30px;
      }

      button {
        min-height: 64px;
        font-size: 18px;
        border-radius: 18px;
      }

      .buttons {
        gap: 12px;
      }

      .modal-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="card">
  <h1>残業代タイマー</h1>

  <div class="amount-label">現在の残業代</div>
  <div class="amount" id="amount">¥0.000</div>

  <div class="field-group">
    <label for="startTime" class="field-label">出勤時間</label>
    <input type="time" id="startTime" class="time-input" value="08:30" />
  </div>

  <div class="settings-summary">
    <div class="settings-summary-title">現在の設定</div>
    <div class="settings-summary-value" id="settingsSummary">¥2000/時間・9時間<small>通常モード・未設定時はデフォルト値を使用</small></div>
  </div>

  <div class="buttons">
    <button class="primary" id="startBtn">計算開始</button>
    <button class="accent" id="resetBtn">リセット</button>
  </div>

  <div class="buttons">
    <button class="secondary" id="settingsBtn">設定</button>
    <button class="secondary" id="themeBtn">ナイトモード</button>
  </div>

  <div class="info">
    <div class="info-item">
      <div class="info-title">勤務時間</div>
      <div class="info-value" id="workDuration">00:00:00</div>
    </div>

    <div class="info-item">
      <div class="info-title">残業時間</div>
      <div class="info-value" id="overtimeDuration">00:00:00</div>
    </div>
  </div>

  <div class="hint">
    残業時間 = 勤務時間 - 所定労働時間<br>
    金額 = 残業秒数 ×（時間あたり残業代 ÷ 3600）
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>設定</h2>
    <p>時間あたり残業代と所定労働時間を変更できます。未入力またはデフォルトに戻した場合は、2000円/時間・9時間で計算します。</p>

    <div class="field-group">
      <label for="hourlyPayInput" class="field-label">時間あたり残業代（円/時間）</label>
      <input type="number" id="hourlyPayInput" min="0" step="0.001" placeholder="デフォルト 2000" />
    </div>

    <div class="field-group">
      <label for="workHoursInput" class="field-label">所定労働時間（時間）</label>
      <input type="number" id="workHoursInput" min="0" step="0.001" placeholder="デフォルト 9" />
    </div>

    <div class="modal-actions">
      <button class="secondary" id="cancelSettingsBtn">キャンセル</button>
      <button class="secondary" id="defaultSettingsBtn">デフォルト</button>
      <button class="accent" id="saveSettingsBtn">保存</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_HOURLY_PAY = 2000;
  const DEFAULT_WORK_HOURS = 9;
  const DEFAULT_START_TIME = "08:30";
  const DEFAULT_THEME = "light";
  const STORAGE_KEY = "overtimeTimerSettings";

  const amountEl = document.getElementById("amount");
  const workDurationEl = document.getElementById("workDuration");
  const overtimeDurationEl = document.getElementById("overtimeDuration");
  const startTimeInput = document.getElementById("startTime");
  const startBtn = document.getElementById("startBtn");
  const resetBtn = document.getElementById("resetBtn");
  const settingsBtn = document.getElementById("settingsBtn");
  const settingsSummaryEl = document.getElementById("settingsSummary");
  const themeBtn = document.getElementById("themeBtn");

  const modalBackdrop = document.getElementById("modalBackdrop");
  const hourlyPayInput = document.getElementById("hourlyPayInput");
  const workHoursInput = document.getElementById("workHoursInput");
  const cancelSettingsBtn = document.getElementById("cancelSettingsBtn");
  const defaultSettingsBtn = document.getElementById("defaultSettingsBtn");
  const saveSettingsBtn = document.getElementById("saveSettingsBtn");

  let timerId = null;
  let startDate = null;

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return {
          hourlyPay: DEFAULT_HOURLY_PAY,
          workHours: DEFAULT_WORK_HOURS,
          startTime: DEFAULT_START_TIME,
          theme: DEFAULT_THEME
        };
      }
      const parsed = JSON.parse(raw);
      return {
        hourlyPay: Number.isFinite(Number(parsed.hourlyPay)) && Number(parsed.hourlyPay) >= 0
          ? Number(parsed.hourlyPay)
          : DEFAULT_HOURLY_PAY,
        workHours: Number.isFinite(Number(parsed.workHours)) && Number(parsed.workHours) >= 0
          ? Number(parsed.workHours)
          : DEFAULT_WORK_HOURS,
        startTime: typeof parsed.startTime === "string" && /^\d{2}:\d{2}$/.test(parsed.startTime)
          ? parsed.startTime
          : DEFAULT_START_TIME,
        theme: parsed.theme === "dark" ? "dark" : DEFAULT_THEME
      };
    } catch {
      return {
        hourlyPay: DEFAULT_HOURLY_PAY,
        workHours: DEFAULT_WORK_HOURS,
        startTime: DEFAULT_START_TIME,
        theme: DEFAULT_THEME
      };
    }
  }

  function saveSettings(settings) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
  }

  function getSettings() {
    return loadSettings();
  }

  function openSettings() {
    const settings = getSettings();
    hourlyPayInput.value = settings.hourlyPay;
    workHoursInput.value = settings.workHours;
    modalBackdrop.classList.add("show");
  }

  function closeSettings() {
    modalBackdrop.classList.remove("show");
  }

  function applyTheme(theme) {
    document.body.classList.toggle("dark-mode", theme === "dark");
    themeBtn.textContent = theme === "dark" ? "通常モード" : "ナイトモード";
  }

  function updateSettingsSummary() {
    const settings = getSettings();
    settingsSummaryEl.innerHTML =
      `¥${settings.hourlyPay}/時間・${settings.workHours}時間<small>${settings.theme === "dark" ? "ナイトモード" : "通常モード"}・未設定時はデフォルト値を使用</small>`;
  }

  function formatDuration(totalSeconds) {
    const safeSeconds = Math.max(0, Math.floor(totalSeconds));
    const hours = String(Math.floor(safeSeconds / 3600)).padStart(2, "0");
    const minutes = String(Math.floor((safeSeconds % 3600) / 60)).padStart(2, "0");
    const seconds = String(safeSeconds % 60).padStart(2, "0");
    return `${hours}:${minutes}:${seconds}`;
  }

  function buildStartDate(timeValue) {
    const [hours, minutes] = timeValue.split(":").map(Number);
    const now = new Date();
    const date = new Date(
      now.getFullYear(),
      now.getMonth(),
      now.getDate(),
      hours,
      minutes,
      0,
      0
    );

    if (date.getTime() > now.getTime()) {
      date.setDate(date.getDate() - 1);
    }
    return date;
  }

  function updateDisplay() {
    if (!startDate) return;

    const now = new Date();
    const workedSeconds = Math.max(0, (now - startDate) / 1000);

    const settings = getSettings();
    const overtimeSeconds = Math.max(0, workedSeconds - settings.workHours * 3600);
    const payPerSecond = settings.hourlyPay / 3600;
    const amount = overtimeSeconds * payPerSecond;

    workDurationEl.textContent = formatDuration(workedSeconds);
    overtimeDurationEl.textContent = formatDuration(overtimeSeconds);
    amountEl.textContent = `¥${amount.toFixed(3)}`;
  }

  function persistStartTime() {
    const settings = getSettings();
    saveSettings({
      ...settings,
      startTime: startTimeInput.value || DEFAULT_START_TIME,
      theme: settings.theme || DEFAULT_THEME
    });
  }

  function applyStoredSettingsToUI() {
    const settings = getSettings();
    startTimeInput.value = settings.startTime || DEFAULT_START_TIME;
    applyTheme(settings.theme || DEFAULT_THEME);
    updateSettingsSummary();
  }

  function startCalculation() {
    const timeValue = startTimeInput.value;
    if (!timeValue) {
      alert("先に出勤時間を入力してください");
      return;
    }

    persistStartTime();
    startDate = buildStartDate(timeValue);

    if (timerId !== null) clearInterval(timerId);
    startBtn.textContent = "計算中";
    updateDisplay();
    timerId = setInterval(updateDisplay, 33);
  }

  function resetAll() {
    if (timerId !== null) {
      clearInterval(timerId);
      timerId = null;
    }

    startDate = null;
    const settings = getSettings();
    startTimeInput.value = settings.startTime || DEFAULT_START_TIME;

    amountEl.textContent = "¥0.000";
    workDurationEl.textContent = "00:00:00";
    overtimeDurationEl.textContent = "00:00:00";
    updateSettingsSummary();

    startBtn.textContent = "計算開始";
  }

  startBtn.addEventListener("click", startCalculation);
  resetBtn.addEventListener("click", resetAll);

  settingsBtn.addEventListener("click", openSettings);
  cancelSettingsBtn.addEventListener("click", closeSettings);

  themeBtn.addEventListener("click", () => {
    const settings = getSettings();
    const nextTheme = settings.theme === "dark" ? "light" : "dark";
    saveSettings({
      ...settings,
      theme: nextTheme,
      startTime: settings.startTime || startTimeInput.value || DEFAULT_START_TIME
    });
    applyStoredSettingsToUI();
  });

  defaultSettingsBtn.addEventListener("click", () => {
    hourlyPayInput.value = DEFAULT_HOURLY_PAY;
    workHoursInput.value = DEFAULT_WORK_HOURS;
  });

  saveSettingsBtn.addEventListener("click", () => {
    const hourlyPay = hourlyPayInput.value === "" ? DEFAULT_HOURLY_PAY : Number(hourlyPayInput.value);
    const workHours = workHoursInput.value === "" ? DEFAULT_WORK_HOURS : Number(workHoursInput.value);

    if (!Number.isFinite(hourlyPay) || hourlyPay < 0) {
      alert("時間あたり残業代には 0 以上の数値を入力してください");
      return;
    }
    if (!Number.isFinite(workHours) || workHours < 0) {
      alert("所定労働時間には 0 以上の数値を入力してください");
      return;
    }

    const currentSettings = getSettings();
    saveSettings({
      hourlyPay,
      workHours,
      startTime: startTimeInput.value || DEFAULT_START_TIME,
      theme: currentSettings.theme || DEFAULT_THEME
    });

    applyStoredSettingsToUI();
    updateDisplay();
    closeSettings();
  });

  startTimeInput.addEventListener("change", persistStartTime);

  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeSettings();
  });

  applyStoredSettingsToUI();
</script>
</body>
</html>
